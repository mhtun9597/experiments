receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

  # prometheus:
  #   config:
  #     scrape_configs:
  #       - job_name: "demo-app-prom-metrics"
  #         scrape_interval: 5s
  #         static_configs:
  #           - targets: ["host.docker.internal:3333"]

processors:
  batch:

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889

  otlp/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true
  # loki:
  #   endpoint: http://loki:3100/loki/api/v1/push
  otlphttp/logs:
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/logs]
