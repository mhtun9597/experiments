version: "3.8"
services:
  postgres:
    image: postgres
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - 5432:5432
    networks:
      - postgres-network
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: admin

networks:
  postgres-network:
    driver: bridge
volumes:
  postgres-data:
