services:
  postgres:
    image: postgres
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - 5432:5432
    networks:
      - postgres-network
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: admin

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "8000:8000"
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro 
      - ./nginx/certificates:/etc/nginx/certs:ro
      - .htpasswd:/etc/nginx/.htpasswd:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"  

networks:
  postgres-network:
    driver: bridge
volumes:
  postgres-data:
