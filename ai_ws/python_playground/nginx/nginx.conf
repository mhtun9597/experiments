events {}

http {

    # (optional but recommended)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # =========================
    # HTTP → HTTPS redirect
    # =========================
    server {
        listen 80;
        server_name mhvaultcx.com api.mhvaultcx.com;
    
        return 301 https://$host$request_uri;
    }


    server {
      listen 8000;
      server_name _;

      # -----------------------
      # REVERSE PROXY FOR OLLAMA
      # -----------------------
      location /ollama/ {
  
        # ✅ ALLOW specific IPs
        # allow localhost;
        allow 127.0.0.1;
        allow 172.0.0.0/8;     # docker bridge range
        allow 10.0.0.0/8;      # private networks
        # allow YOUR_PUBLIC_IP;  # optional external IP
    
        # ❌ DENY everyone else
        deny all;

        # -----------------------
        # BASIC AUTH
        # -----------------------
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://host.docker.internal:11434/;
     
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
      }


      # -----------------------
      # REVERSE PROXY FOR TOOL TETSING
      # -----------------------
      location /tool_testing/ {

        proxy_pass http://host.docker.internal:1111/;
     
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
      }


      # -----------------------
      # REVERSE PROXY FOR WEBSITE
      # -----------------------
      location / {

        proxy_pass http://host.docker.internal:8082/;
     
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
      }

    
    }

    server {
        listen 443 ssl;
        server_name api.mhvaultcx.com;

        ssl_certificate     /etc/nginx/certs/mhvaultcx_fullchain.cer;
        ssl_certificate_key /etc/nginx/certs/mhvaultcx.key;

        location / {
            proxy_pass http://host.docker.internal:8080;

            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 3600;
            proxy_send_timeout 3600;

            proxy_buffering off;
        }
    }

    server {
        listen 443 ssl;
        server_name mhvaultcx.com;

        ssl_certificate     /etc/nginx/certs/mhvaultcx_fullchain.cer;
        ssl_certificate_key /etc/nginx/certs/mhvaultcx.key;


        location / {
        proxy_pass http://host.docker.internal:8081;

        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
       }    
    }
}